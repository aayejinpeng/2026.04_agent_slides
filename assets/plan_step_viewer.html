<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plan Step Viewer</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, rgba(9, 18, 34, 0.98) 0%, rgba(4, 9, 18, 1) 100%);
      overflow: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(125, 158, 204, 0.5) transparent;
    }

    .wrap {
      min-height: 100%;
      padding: 12px;
      box-sizing: border-box;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 14px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <img src="../exvalidraw/plan&step.png" alt="plan and step diagram">
  </div>
</body>
</html>
