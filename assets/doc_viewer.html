<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doc Viewer</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, rgba(9, 18, 34, 0.98) 0%, rgba(4, 9, 18, 1) 100%);
      color: #edf4ff;
      overflow: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(125, 158, 204, 0.5) transparent;
      font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    .wrap {
      min-height: 100%;
      padding: 18px 22px 32px;
      box-sizing: border-box;
    }

    .doc {
      max-width: 900px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(120, 157, 219, 0.14);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.22);
    }

    .doc-topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
    }

    .doc-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
    }

    .doc-dot:nth-child(1) { background: #ff7b72; }
    .doc-dot:nth-child(2) { background: #f2cc60; }
    .doc-dot:nth-child(3) { background: #7ee787; }

    .doc-title {
      margin-left: 6px;
      color: #dce7f8;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.03em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .doc-badge {
      margin-left: auto;
      font-size: 11px;
      color: #9fcbff;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid rgba(120,157,219,0.2);
      background: rgba(58,127,213,0.12);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 700;
    }

    .doc-body {
      padding: 18px 20px 24px;
    }

    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 14px;
      line-height: 1.75;
      color: #d7e5fb;
      font-family: "JetBrains Mono", "Fira Code", monospace;
    }

    .md-line {
      display: block;
    }

    .md-line.heading-1 {
      color: #ffffff;
      font-size: 24px;
      font-weight: 800;
      line-height: 1.35;
      margin-bottom: 0.5em;
    }

    .md-line.heading-2 {
      color: #cfe4ff;
      font-size: 17px;
      font-weight: 800;
      margin-top: 1.15em;
      margin-bottom: 0.4em;
    }

    .md-line.heading-3 {
      color: #a8ccff;
      font-size: 15px;
      font-weight: 700;
      margin-top: 0.95em;
      margin-bottom: 0.25em;
    }

    .md-line.list-item {
      padding-left: 0.8em;
      color: #d7e5fb;
    }

    .md-line.list-item::before {
      content: "• ";
      color: #84bbff;
      margin-left: -0.8em;
      position: absolute;
    }

    .md-line.code-fence {
      margin: 0.45em 0;
      padding: 0.65em 0.8em;
      border-radius: 12px;
      background: rgba(5, 10, 20, 0.9);
      border: 1px solid rgba(120, 157, 219, 0.14);
      color: #dce7f8;
    }

    .md-line.blockquote {
      padding-left: 0.9em;
      margin: 0.4em 0;
      border-left: 3px solid rgba(125, 158, 204, 0.4);
      color: #c7d8f4;
    }

    .inline-code {
      font-family: "JetBrains Mono", "Fira Code", monospace;
      background: rgba(255,255,255,0.07);
      padding: 0.08em 0.32em;
      border-radius: 6px;
      color: #9fcbff;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <article class="doc">
      <div class="doc-topbar">
        <span class="doc-dot"></span>
        <span class="doc-dot"></span>
        <span class="doc-dot"></span>
        <div id="doc-title" class="doc-title">Loading...</div>
        <div class="doc-badge">markdown</div>
      </div>
      <div class="doc-body">
        <pre id="doc">Loading...</pre>
      </div>
    </article>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const hashSrc = decodeURIComponent((window.location.hash || '').replace(/^#/, ''));
    const src = params.get('src') || hashSrc;
    const target = document.getElementById('doc');
    const title = document.getElementById('doc-title');

    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function decorateInline(text) {
      return escapeHtml(text).replace(/`([^`]+)`/g, '<span class="inline-code">$1</span>');
    }

    function renderMarkdownLike(text) {
      const lines = text.split('\n');
      let inCode = false;
      return lines.map((line) => {
        if (line.startsWith('```')) {
          inCode = !inCode;
          return `<span class="md-line code-fence">${escapeHtml(line || '```')}</span>`;
        }
        if (inCode) {
          return `<span class="md-line code-fence">${escapeHtml(line)}</span>`;
        }
        if (line.startsWith('# ')) {
          return `<span class="md-line heading-1">${decorateInline(line.slice(2))}</span>`;
        }
        if (line.startsWith('## ')) {
          return `<span class="md-line heading-2">${decorateInline(line.slice(3))}</span>`;
        }
        if (line.startsWith('### ')) {
          return `<span class="md-line heading-3">${decorateInline(line.slice(4))}</span>`;
        }
        if (line.startsWith('- ')) {
          return `<span class="md-line list-item">${decorateInline(line.slice(2))}</span>`;
        }
        if (line.startsWith('> ')) {
          return `<span class="md-line blockquote">${decorateInline(line.slice(2))}</span>`;
        }
        return `<span class="md-line">${decorateInline(line) || '&nbsp;'}</span>`;
      }).join('');
    }

    async function render() {
      if (!src) {
        target.textContent = 'Missing ?src=...';
        return;
      }
      try {
        title.textContent = src.split('/').pop();
        const response = await fetch(src);
        const text = await response.text();
        target.innerHTML = renderMarkdownLike(text);
      } catch (error) {
        target.textContent = `Failed to load ${src}`;
        console.error(error);
      }
    }

    render();
  </script>
</body>
</html>
